version: 1.3.6

cache: true

registration:
  socialLogins: ['openid']

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  temporaryChat: true
  temporaryChatRetention: 24
  prompts: true
  bookmarks: true
  memories: true
  multiConvo: true
  agents: true
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: true
    create: true
    share: false
    public: false
  remoteAgents:
    use: true
    create: true
    share: false
    public: false
  
  mcpServers:
    placeholder: "Select MCP Server"
    use: true
    create: true
    share: false
    trustCheckbox:
      label:
        en: "I trust this server"
        fr: "Je fais confiance à ce serveur"
      subLabel:
        en: "Only enable servers you trust"
        fr: "Activer uniquement les serveurs en lesquels vous avez confiance"
  
includedTools: ["google", "calculator", "gemini_image_gen"]
imageOutputType: "PNG"

speech:
  tts:
    openai:
      apiKey: "${TTS_API_KEY}"
      model: "tts-1-hd"
      voices: ["alloy", "echo", "fable", "onyx", "nova", "shimmer"]
  stt:
    openai:
      apiKey: "${STT_API_KEY}"
      model: "whisper-1"
  speechTab:
    conversationMode: false
    advancedMode: false
    speechToText: true
    textToSpeech:
      engineTTS: "openai"
      voice: "nova"
      automaticPlayback: false

endpoints:
  custom:
    - name: 'OpenAI-custom'
      apiKey: '${LITELLM_OPENAI_API_KEY}'
      baseURL: '${LITELLM_BASE_URL}'
      models:
        default: ["gpt-4o-mini"]
        fetch: true
      titleConvo: true
      titleModel: "gpt-4o-mini"
      summarize: false
      summaryModel: "gpt-4o-mini"
      modelDisplayLabel: "OpenAI-custom"
    - name: 'Google-custom'
      apiKey: '${LITELLM_GOOGLE_API_KEY}'
      baseURL: '${LITELLM_BASE_URL}'
      models:
        default: ["gemini/gemini-2.5-flash-lite"]
        fetch: true
      titleConvo: true
      titleModel: "gemini/gemini-2.5-flash-lite"
      summarize: false
      summaryModel: "gemini/gemini-2.5-flash-lite"
      modelDisplayLabel: "Google-custom"
  agents:
    disableBuilder: false
    # File citation configuration
    maxCitations: 20
    maxCitationsPerFile: 5
    minRelevanceScore: 0.6
    # Custom capabilities
    capabilities:
      # - "execute_code"
      - "file_search"
      #- "actions"
      - "tools"
      # - "artifacts"
      - "context"
      # - "ocr"
      - "chain"

