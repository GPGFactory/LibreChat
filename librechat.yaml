version: 1.3.6

cache: true

registration:
  socialLogins: ['openid']

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false

endpoints:
  custom:
    - name: 'OpenAI-custom'
      apiKey: '${LITELLM_OPENAI_API_KEY}'
      baseURL: '${LITELLM_BASE_URL}'
      models:
        default: ["gpt-4o-mini"]
        fetch: true
      titleConvo: true
      titleModel: "gpt-4o-mini"
      summarize: false
      summaryModel: "gpt-4o-mini"
      modelDisplayLabel: "OpenAI-custom"
    - name: 'Google-custom'
      apiKey: '${LITELLM_GOOGLE_API_KEY}'
      baseURL: '${LITELLM_BASE_URL}'
      models:
        default: ["gemini/gemini-2.5-flash-lite"]
        fetch: true
      titleConvo: true
      titleModel: "gemini/gemini-2.5-flash-lite"
      summarize: false
      summaryModel: "gemini/gemini-2.5-flash-lite"
      modelDisplayLabel: "Google-custom"
    - name: 'Anthropic-custom'
      apiKey: '${LITELLM_ANTHROPIC_API_KEY}'
      baseURL: '${LITELLM_BASE_URL}'
      models:
        default: ["claude-4-5-sonnet"]
        fetch: true
      titleConvo: true
      titleModel: "claude-4-5-sonnet"
      summarize: false
      summaryModel: "claude-4-5-sonnet"
      modelDisplayLabel: "Anthropic-custom"
    - name: 'Mistral-custom'
      apiKey: '${LITELLM_MISTRAL_API_KEY}'
      baseURL: '${LITELLM_BASE_URL}'
      models:
        default: ["mistral-small"]
        fetch: true
      titleConvo: true
      titleModel: "mistral-small"
      summarize: false
      summaryModel: "mistral-small"
      modelDisplayLabel: "Mistral-custom"
